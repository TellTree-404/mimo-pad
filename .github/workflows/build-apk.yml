name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Cache signing keystore
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: mimopad.keystore
          key: keystore-mimopad-v1

      - name: Generate fixed keystore
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -v \
            -keystore mimopad.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -dname "CN=MiMoPad, OU=Dev, O=TellTree, L=Beijing, C=CN"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Configure signing
        run: |
          mkdir -p ~/.android
          cp mimopad.keystore ~/.android/debug.keystore

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-Pad-Agent
          path: android/app/build/outputs/apk/debug/app-debug.apk
